<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- 1. Sabse pehle language decoder -->
    <meta charset="UTF-8" />
    
    <!-- 2. TUMHARA ASLI GOOGLE VERIFICATION TAG (Jo tumhare screenshot mein tha) -->
    <meta name="google-site-verification" content="ud2o6lRMNRdtyV8eoqwp-eO3UIb3uVcz" />
